    <script th:inline="javascript">
		
	document.addEventListener("DOMContentLoaded", function() {
        document.querySelectorAll("[id='Cuentas']").forEach(function(container) {
            var input = container.querySelector(".CuentaInput");
            var select = container.querySelector(".CuentaSelect");
            var xIdContaBook = container.getAttribute("data-xidcontabook");

            console.log("xIdContaBook es " + xIdContaBook);

            if (xIdContaBook === "0") {              
                    input.style.display = "block";
                    select.style.display = "none";               
            }
        });
    });
    
    
    //Control nombres cuentas contables 
    document.addEventListener("DOMContentLoaded", function() {
       var idLinea = document.getElementById("idLinea").value;
        console.log("idLinea en actualizarReferencia es " + idLinea);
        
        
        var RecaudoDebitoLabel = document.getElementById("RecaudoDebitoLabel");
        var FacturaDebitoLabel = document.getElementById("FacturaDebitoLabel");
        var RecuadoCreditoLabel = document.getElementById("RecuadoCreditoLabel");
        var FacturaCreditoLabel = document.getElementById("FacturaCreditoLabel");
        
        
    // Validar si idLinea es 300 o 100 y actualizar los labels
    if (idLinea == 300 || idLinea == 100) {
        RecaudoDebitoLabel.textContent = "CUENTA PAGO DÉBITO:";
        FacturaDebitoLabel.textContent = "CUENTA GASTO DÉBITO:";
        RecuadoCreditoLabel.textContent = "CUENTA PAGO CRÉDITO:";
        FacturaCreditoLabel.textContent = "CUENTA GASTO CRÉDITO:";
        
        
        RecaudoDebitoLabel.style.marginRight = "53px";
        FacturaDebitoLabel.style.marginRight = "34px";
        RecuadoCreditoLabel.style.marginRight = "51px";
        FacturaCreditoLabel.style.marginRight = "33px";
    }
        
        
    });
    
    
		
	function limitarLongitud(elemento, maximo) {
		if (elemento.value.length > maximo) {
			elemento.value = elemento.value.slice(0, maximo);
		}
	}
		
 function limitarValor(input) {
        // Obtener el valor ingresado como texto
        let valor = input.value;

        // Verificar si el nuevo valor es válido
        if (/^\d{0,2}(\.\d{0,2})?$/.test(valor) || valor === '') {
            // Si es válido o está vacío, actualizar el valor
            input.setAttribute('data-previous-value', valor);
        } else {
            // Si no es válido, mantener el valor anterior
            input.value = input.getAttribute('data-previous-value') || '';
        }
    }
		
	function actualizarReferenciaProveedor() {
		var idPlu = document.getElementById("idPlu").value;
		var descripcion = document.getElementById("descripcion").value;
		var iva = document.getElementById("iva").value;
		var rteFuente = document.getElementById("rteFuente").value;
		var rteIva = document.getElementById("rteIva").value;		
		var rteIca  = document.getElementById("rteIca").value;
		
		var Aviso = document.getElementById("Aviso").value;
		
		
		var selectElement = document.getElementById("categoria");
        var selectedValue = selectElement.value; 

      if (!selectedValue) {
         console.warn("No se ha seleccionado ninguna categoría.");
         return;
       }

      var valores = selectedValue.split("-"); // Divide la cadena en un array usando "-"
      var categoria = valores[0]; 
      var linea = valores[1]; 

      console.log("La categoría es: " + categoria);
      console.log("La línea es: " + linea);
    
    
	  var idLineaConsulta = document.getElementById("idLinea").value;
	  var idCategoriaConsulta = document.getElementById("idCategoria").value;
	
        var RecaudoDebito = 0;
		var FacturaDebito = 0;
		var RecuadoCredito = 0;
		var FacturaCredito = 0;
     
	   
	   var xIdContaBook = 0;
	   
	    document.querySelectorAll("[id='Cuentas']").forEach(function(container) {
            xIdContaBook = container.getAttribute("data-xidcontabook");


        });
        
        
        if (xIdContaBook === "0") {       
			       
         RecaudoDebito = document.getElementById("RecaudoDebito").value;
		 FacturaDebito = document.getElementById("FacturaDebito").value;
		 RecuadoCredito = document.getElementById("RecuadoCredito").value;
		 FacturaCredito = document.getElementById("FacturaCredito").value;              
            }
            
            
        if (xIdContaBook === "1") {     
			         
         RecaudoDebito = document.getElementById("RecaudoDebitoSelect").value;
		 FacturaDebito = document.getElementById("FacturaDebitoSelect").value;
		 RecuadoCredito = document.getElementById("RecuadoCreditoSelect").value;
		 FacturaCredito = document.getElementById("FacturaCreditoSelect").value;               
            }    
        
        
        
        console.log("xIdContaBook en actualizarReferencia es " + xIdContaBook);

	
	
	      if (categoria == "-Seleccione-") {
        alert("Por favor, seleccione una categoria.");
        return;
    }
		
		if (!descripcion) {
        alert("Por favor, ingrese una descripción.");
        return;
    }

    

    
    	if (!iva) {
        alert("Por favor, ingrese el IVA.");
        return;
    }
    
     if (!rteFuente) {
        alert("Por favor, ingrese  rteFuente.");
        return;
    }
    
    
        if (!rteIva) {
        alert("Por favor, ingrese rteIva.");
        return;
    }
    
    
         if (!rteIca) {
        alert("Por favor, ingrese rteIca.");
        return;
    }
   
   
    	
		
		
		// Crear un objeto que contenga los datos a enviar
    var datos = {
			idPlu: idPlu,
        	categoria: categoria,
			descripcion: descripcion,
			iva: iva,
			rteFuente: rteFuente,
			rteIva: rteIva,
			rteIca: rteIca,
			RecaudoDebito: RecaudoDebito,
			FacturaDebito: FacturaDebito,
			RecuadoCredito: RecuadoCredito,
			FacturaCredito: FacturaCredito,
			Aviso: Aviso,
			linea: linea
    };
    
    // Realizar una solicitud POST al controlador
    fetch("./ActualizarReferenciaProveedor-Post", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
        },
        body: JSON.stringify(datos),
    })
    .then((response) => response.json())
    .then((data) => {
		
		var message = data.message;
       console.log(message);
			var idPlu = data.idPlu
       
          swal({
            title: "¡Referencia con ID: " + idPlu + " actualizada correctamente",
            //text: "La PQR  " + numeroRadicado + " ha sido creada correctamente",
            icon: "success",
            button: "Continuar",
        })
        .then((value) => {
            // Redirigimos a la vista "CrearSuscriptor"" al hacer clic en el botón Continuar
            if (value) {
				window.location.href =
				"./ReferenciaPosConsultaProveedor?idLinea=" + idLineaConsulta +
				"&idCategoria=" + idCategoriaConsulta;
            }
        });

    })
    .catch((error) => {
        console.error("Error al registrar el log:", error);
    });
    
		
	
	}
		
	
		
	
	</script>
